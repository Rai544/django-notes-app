version: '3.8'

services:
  db_cont:
    image: mysql:8.0
    container_name: django_db
    restart: always
    environment:
      MYSQL_DATABASE: test_db
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - django_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: django-app:latest 
    container_name: django_app
    command: >
      sh -c "python manage.py migrate &&
             gunicorn notesapp.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db_cont:
        condition: service_healthy
    networks:
      - django_network

  nginx:
    build: ./nginx
    container_name: nginx_cont
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - django_network

networks:
  django_network:
    driver: bridge

volumes:
  mysql_data:
